                <div class="glass p-6 rounded-2xl shadow-xl">
                  <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-indigo-400">
                    ✉️ Crear Cuenta de Correo
                  </h2>
                  <form id="createForm" class="space-y-4">
                    <div>
                      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Correo Completo</label>
                      <input type="email" id="email" required placeholder="contacto@cliente.com" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                    </div>
                    <div>
                      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Contraseña</label>
                      <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••" class="w-full pl-4 pr-12 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-400 transition">
                          <span id="eyeIcon">👁️</span>
