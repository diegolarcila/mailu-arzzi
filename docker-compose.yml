                      </div>
                    </div>
                    <div>
                      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Límite de Almacenamiento (Cuota)</label>
                      <select id="quota" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                        <option value="">Ilimitado</option>
                        <option value="250M">250 MB</option>
                        <option value="500M">500 MB</option>
                        <option value="1G" selected>1 GB</option>
                        <option value="2G">2 GB</option>
                        <option value="5G">5 GB</option>
                        <option value="10G">10 GB</option>
                      </select>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition rounded-xl font-medium text-sm shadow-lg shadow-indigo-900/40">
                      Crear Cuenta y Registrar DNS
                    </button>
                  </form>
                  <div id="statusMsg" class="mt-4 text-center text-sm hidden"></div>
                </div>

                <!-- Card Editar Cuenta (Oculto por defecto) -->
                <div id="editCard" class="glass p-6 rounded-2xl shadow-xl mt-8 hidden">
                  <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-indigo-400">
                    ✏️ Editar Cuenta de Correo
                  </h2>
                  <form id="editForm" class="space-y-4">
                    <div>
                      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Correo</label>
                      <input type="email" id="editEmail" readonly class="w-full px-4 py-3 bg-gray-950 border border-gray-900 rounded-xl focus:outline-none text-sm text-gray-400 cursor-not-allowed">
                    </div>
                    <div>
                      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Nueva Contraseña</label>
                      <div class="relative">
                        <input type="password" id="editPassword" placeholder="Dejar en blanco para mantener" class="w-full pl-4 pr-12 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                        <button type="button" onclick="toggleEditPassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-400 transition">
                          <span id="editEyeIcon">👁️</span>
                        </button>
                      </div>
                    </div>
                    <div>
                      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Límite de Almacenamiento (Cuota)</label>
                      <select id="editQuota" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                        <option value="">Ilimitado</option>
                        <option value="250M">250 MB</option>
                        <option value="500M">500 MB</option>
                        <option value="1G">1 GB</option>
                        <option value="2G">2 GB</option>
                        <option value="5G">5 GB</option>
                        <option value="10G">10 GB</option>
                      </select>
                    </div>
                    <div class="flex gap-2">
                      <button type="submit" id="editSubmitBtn" class="flex-1 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition rounded-xl font-medium text-sm shadow-lg shadow-indigo-900/40">
                        Guardar Cambios
                      </button>
                      <button type="button" onclick="cancelEdit()" class="px-4 py-3 bg-gray-800 hover:bg-gray-700 transition rounded-xl font-medium text-sm">
                        Cancelar
                      </button>
                    </div>
                  </form>
                  <div id="editStatusMsg" class="mt-4 text-center text-sm hidden"></div>
                </div>
              </div>

              <div class="lg:col-span-2 space-y-8">
                <div class="glass p-6 rounded-2xl shadow-xl">
                  <h2 class="text-xl font-semibold mb-6 text-indigo-400">👥 Cuentas de Correo Activas</h2>
                  <div class="overflow-x-auto">
                    <table class="w-full text-left">
                      <thead>
                        <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wider">
                          <th class="pb-3 font-semibold">Dirección de Correo</th>
                          <th class="pb-3 font-semibold">Dominio</th>
                          <th class="pb-3 font-semibold">Cuota</th>
                          <th class="pb-3 font-semibold text-right">Acciones</th>
                        </tr>
                      </thead>
                      <tbody id="accountsTable" class="divide-y divide-gray-900 text-sm text-gray-300">
                      </tbody>
                    </table>
                  </div>
                </div>

                <div class="glass p-6 rounded-2xl shadow-xl">
                  <h2 class="text-xl font-semibold mb-6 text-indigo-400">⚙️ Configuración DNS por Dominio</h2>
                  <div id="dnsContainer" class="space-y-6">
                  </div>
                </div>
              </div>
            </div>
          </div>

          <script>
            async function loadData() {
              try {
                const res = await fetch('/api/data');
                const data = await res.json();

                const accountsTable = document.getElementById('accountsTable');
                accountsTable.innerHTML = '';
                 if (data.accounts.length === 0) {
                  accountsTable.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-gray-500">No hay cuentas creadas aún.</td></tr>';
                } else {
                  data.accounts.forEach(acc => {
                    accountsTable.innerHTML += '<tr class="hover:bg-gray-900/30 transition">' +
                      '<td class="py-3 font-medium">' + acc.email + '</td>' +
                      '<td class="py-3 text-gray-400">' + acc.domain + '</td>' +
                      '<td class="py-3 text-gray-400">' + acc.quota + '</td>' +
                      '<td class="py-3 text-right">' +
                        '<button onclick="startEdit(\'' + acc.email + '\', \'' + acc.quota + '\')" class="text-xs bg-indigo-600/30 text-indigo-400 hover:bg-indigo-600 hover:text-white px-3 py-1 rounded-lg transition">Editar</button>' +
                      '</td>' +
                    '</tr>';
                  });
                }

                const dnsContainer = document.getElementById('dnsContainer');
                dnsContainer.innerHTML = '';
                if (data.dnsData.length === 0) {
                  dnsContainer.innerHTML = '<p class="text-gray-500 text-sm">Crea una cuenta para ver la información DNS de su dominio.</p>';
                } else {
                  data.dnsData.forEach(domainData => {
                    dnsContainer.innerHTML += '<div class="p-6 bg-gray-900/40 border border-gray-800 rounded-xl space-y-4">' +
                      '<h3 class="font-bold text-lg text-blue-400 flex justify-between items-center">' +
                        '<span>' + domainData.domain + '</span>' +
                        '<span class="text-xs font-normal text-gray-400">DNS Config</span>' +
                      '</h3>' +
                      '<div class="overflow-x-auto">' +
                        '<table class="w-full text-left text-xs">' +
                          '<thead>' +
                            '<tr class="border-b border-gray-800 text-gray-400 uppercase tracking-wider">' +
                              '<th class="pb-2 font-semibold">Tipo</th>' +
                              '<th class="pb-2 font-semibold">Nombre / Host</th>' +
                              '<th class="pb-2 font-semibold">Valor / Destino</th>' +
                              '<th class="pb-2 font-semibold text-right">Acciones</th>' +
                            '</tr>' +
                          '</thead>' +
                          '<tbody class="divide-y divide-gray-900 text-gray-300">' +
                            '<tr class="hover:bg-gray-900/20 transition">' +
                              '<td class="py-3"><span class="bg-blue-900/30 text-blue-400 px-2 py-0.5 rounded font-mono">A</span></td>' +
                              '<td class="py-3 font-mono">mail</td>' +
                              '<td class="py-3 font-mono text-gray-450">173.212.255.14</td>' +
                              '<td class="py-3 text-right space-x-1 shrink-0">' +
                                '<button onclick="copyText(\'mail\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                                '<button onclick="copyText(\'173.212.255.14\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                              '</td>' +
                            '</tr>' +
                            '<tr class="hover:bg-gray-900/20 transition">' +
                              '<td class="py-3"><span class="bg-green-900/30 text-green-400 px-2 py-0.5 rounded font-mono">MX</span></td>' +
                              '<td class="py-3 font-mono">@</td>' +
                              '<td class="py-3 font-mono text-gray-450">mail.arzzi.xyz (Prioridad 10)</td>' +
                              '<td class="py-3 text-right space-x-1 shrink-0">' +
                                '<button onclick="copyText(\'@\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                                '<button onclick="copyText(\'mail.arzzi.xyz\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                              '</td>' +
                            '</tr>' +
                            '<tr class="hover:bg-gray-900/20 transition">' +
                              '<td class="py-3"><span class="bg-purple-900/30 text-purple-400 px-2 py-0.5 rounded font-mono">TXT</span></td>' +
                              '<td class="py-3 font-mono">@</td>' +
                              '<td class="py-3 font-mono text-green-300 break-all">' + domainData.spf + '</td>' +
