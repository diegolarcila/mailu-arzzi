services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver-j7vrlerr67hcw5p67o3b5dh4
    hostname: mail.arzzi.xyz
    domainname: arzzi.xyz
    ports:
      - "0.0.0.0:25:25"
      - "0.0.0.0:465:465"
      - "0.0.0.0:587:587"
      - "0.0.0.0:143:143"
      - "0.0.0.0:993:993"
    volumes:
      - /var/mail-data/mail/:/var/mail/
      - /var/mail-data/state/:/var/mail-state/
      - /var/mail-data/logs/:/var/log/mail/
      - /var/mail-data/config/:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ENABLE_RSPAMD=1
      - ENABLE_FAIL2BAN=1
      - ENABLE_CLAMAV=0
      - ENABLE_SPAMASSASSIN=0
      - SSL_TYPE=manual
      - SSL_CERT_PATH=/tmp/docker-mailserver/ssl/mail.arzzi.xyz-cert.pem
      - SSL_KEY_PATH=/tmp/docker-mailserver/ssl/mail.arzzi.xyz-key.pem
      - ONE_DIR=1
      - LOG_LEVEL=info
    cap_add:
      - NET_ADMIN
    restart: always
    networks:
      - default

  webmail:
    image: roundcube/roundcubemail:latest
    container_name: webmail-j7vrlerr67hcw5p67o3b5dh4
    restart: always
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=25
      - ROUNDCUBEMAIL_SMTP_USER=
      - ROUNDCUBEMAIL_SMTP_PASS=
    depends_on:
      - mailserver
    networks:
      - default

  manager:
    image: node:18-alpine
    container_name: manager-j7vrlerr67hcw5p67o3b5dh4
    restart: always
    ports:
      - "0.0.0.0:3000:3000"
    working_dir: /app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/mail-data/config/:/config
    depends_on:
      - mailserver
    networks:
      - default
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /app/views
        cat << 'EOF' > /app/package.json
        {
          "name": "dms-manager",
          "version": "1.0.0",
          "main": "server.js",
          "dependencies": {
            "express": "^4.19.2",
            "nodemailer": "^6.9.13",
            "otplib": "^12.0.1",
            "cookie-parser": "^1.4.6"
          }
        }
        EOF
        cat << 'EOF' > /app/server.js
        const express = require('express');
        const fs = require('fs');
        const path = require('path');
        const http = require('http');
        const nodemailer = require('nodemailer');
        const cookieParser = require('cookie-parser');
        const { authenticator } = require('otplib');

        const app = express();
        const PORT = 3000;
        const DOCKER_SOCKET = '/var/run/docker.sock';
        const CONFIG_DIR = '/config';

        const TOTP_SECRET = 'ARZZIWEBMAILMANAGERSECRETAUTH';
        const SESSION_TOKEN = 'ARZZI_SESSION_SECURE_TOKEN_2026';

        app.use(express.json());
        app.use(express.urlencoded({ extended: true }));
        app.use(cookieParser());

        function checkAuth(req, res, next) {
          if (req.cookies && req.cookies.session === SESSION_TOKEN) {
            return next();
          }
          res.status(401).json({ error: 'Unauthorized. Please login.' });
        }

        function dockerRequest(method, urlPath, body) {
          return new Promise((resolve, reject) => {
            const options = {
              socketPath: DOCKER_SOCKET,
              path: urlPath,
              method: method,
              headers: { 'Content-Type': 'application/json' }
            };
            const req = http.request(options, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                if (res.statusCode >= 200 && res.statusCode < 300) {
                  if (data) {
                    try {
                      resolve(JSON.parse(data));
                    } catch (e) {
                      resolve(data);
                    }
                  } else {
                    resolve(null);
                  }
                } else {
                  reject(new Error('Docker API ' + res.statusCode + ': ' + data));
                }
              });
            });
            req.on('error', reject);
            if (body) req.write(JSON.stringify(body));
            req.end();
          });
        }

        async function getMailserverContainerId() {
          try {
            const containers = await dockerRequest('GET', '/containers/json');
            const mailserver = containers.find(c => 
              c.Image.includes('docker-mailserver') || 
              c.Names.some(n => n.includes('mailserver'))
            );
            if (!mailserver) throw new Error('Docker Mailserver container not found.');
            return mailserver.Id;
          } catch (err) {
            console.error(err);
            return null;
          }
        }

        async function execInMailserver(args) {
          const containerId = await getMailserverContainerId();
          if (!containerId) throw new Error('Mailserver container is offline.');

          const execSetup = await dockerRequest('POST', '/containers/' + containerId + '/exec', {
            AttachStdout: true,
            AttachStderr: true,
            Cmd: ['setup', ...args]
          });

          const output = await dockerRequest('POST', '/exec/' + execSetup.Id + '/start', {
            Detach: false,
            Tty: false
          });
          return output;
        }

        async function execInMailserverRaw(cmd) {
          const containerId = await getMailserverContainerId();
          if (!containerId) throw new Error('Mailserver container is offline.');

          const execSetup = await dockerRequest('POST', '/containers/' + containerId + '/exec', {
            AttachStdout: true,
            AttachStderr: true,
            Cmd: cmd
          });

          const output = await dockerRequest('POST', '/exec/' + execSetup.Id + '/start', {
            Detach: false,
            Tty: false
          });
          return output;
        }

        const transporter = nodemailer.createTransport({
          host: 'mailserver',
          port: 25,
          secure: false,
          tls: {
            rejectUnauthorized: false
          }
        });

        app.post('/api/login', (req, res) => {
          const { code } = req.body;
          if (!code) return res.status(400).json({ error: 'Code is required' });

          const isValid = authenticator.check(code, TOTP_SECRET);
          if (isValid) {
            res.cookie('session', SESSION_TOKEN, { maxAge: 30 * 24 * 60 * 60 * 1000, httpOnly: true });
            return res.json({ success: true });
          } else {
            return res.status(400).json({ error: 'Código inválido o expirado' });
          }
        });

        app.post('/api/logout', (req, res) => {
          res.clearCookie('session');
          res.json({ success: true });
        });

        app.get('/api/data', checkAuth, async (req, res) => {
          try {
            const accountsPath = path.join(CONFIG_DIR, 'postfix-accounts.cf');
            const quotasPath = path.join(CONFIG_DIR, 'dovecot-quotas.cf');
            const domainsPath = path.join(CONFIG_DIR, 'domains.json');
            
            let accounts = [];
            let foundDomains = new Set();
            const quotas = {};

            if (fs.existsSync(quotasPath)) {
              const content = fs.readFileSync(quotasPath, 'utf8');
              content.split('\n').forEach(line => {
                if (line.includes(':')) {
                  const [email, q] = line.split(':');
                  quotas[email.trim()] = q.trim();
                }
              });
            }

            if (fs.existsSync(accountsPath)) {
              const content = fs.readFileSync(accountsPath, 'utf8');
              accounts = content.split('\n')
                .filter(line => line.includes('|'))
                .map(line => {
                  const [email] = line.split('|');
                  const domain = email.split('@')[1];
                  foundDomains.add(domain);
                  return { email, domain, quota: quotas[email] || 'Ilimitado' };
                });
            }

            // Manage registered domains list
            let registeredDomains = [];
            if (fs.existsSync(domainsPath)) {
              try {
                registeredDomains = JSON.parse(fs.readFileSync(domainsPath, 'utf8'));
              } catch (e) {
                registeredDomains = [];
              }
            } else {
              registeredDomains = Array.from(foundDomains);
              fs.writeFileSync(domainsPath, JSON.stringify(registeredDomains, null, 2), 'utf8');
            }

            // Sync any domain found in accounts that isn't in domains.json yet
            let synced = false;
            foundDomains.forEach(d => {
              if (!registeredDomains.includes(d)) {
                registeredDomains.push(d);
                synced = true;
              }
            });
            if (synced) {
              fs.writeFileSync(domainsPath, JSON.stringify(registeredDomains, null, 2), 'utf8');
            }

            const dnsData = {};
            for (const domain of registeredDomains) {
              let dkim = 'DNSSEC/DKIM keys not generated yet. Add email account to generate.';
              const dkimPath = path.join(CONFIG_DIR, 'opendkim/keys/' + domain + '/mail.txt');
              if (fs.existsSync(dkimPath)) {
                const dkimRaw = fs.readFileSync(dkimPath, 'utf8');
                const match = dkimRaw.match(/\(([^)]+)\)/);
                if (match) {
                  dkim = match[1].replace(/[\s"]/g, '');
                } else {
                  dkim = dkimRaw.replace(/[\s"]/g, '');
                }
              }

              dnsData[domain] = {
                mx: 'mail.arzzi.xyz (Priority: 10)',
                spf: 'v=spf1 mx ip4:173.212.255.14 ~all',
                dkim: dkim,
                dmarc: 'v=DMARC1; p=none; pct=100; rua=mailto:postmaster@' + domain
              };
            }

            res.json({ 
              accounts, 
              domains: registeredDomains, 
              dnsData: Object.entries(dnsData).map(([domain, records]) => ({ domain, ...records })) 
            });
          } catch (err) {
            res.status(500).json({ error: err.message });
          }
        });

        app.post('/api/domains', checkAuth, async (req, res) => {
          const { domain } = req.body;
          if (!domain) return res.status(400).json({ error: 'Domain is required' });

          const domainClean = domain.trim().toLowerCase();
          const domainsPath = path.join(CONFIG_DIR, 'domains.json');
          let registeredDomains = [];

          try {
            if (fs.existsSync(domainsPath)) {
              try {
                registeredDomains = JSON.parse(fs.readFileSync(domainsPath, 'utf8'));
              } catch (e) {
                registeredDomains = [];
              }
            }

            if (!registeredDomains.includes(domainClean)) {
              registeredDomains.push(domainClean);
              fs.writeFileSync(domainsPath, JSON.stringify(registeredDomains, null, 2), 'utf8');
            }

            res.json({ success: true });
          } catch (err) {
            res.status(500).json({ error: err.message });
          }
        });

        app.post('/api/accounts', checkAuth, async (req, res) => {
          const { email, password, quota } = req.body;
          if (!email || !password) return res.status(400).json({ error: 'Email and password required' });

          try {
            await execInMailserver(['email', 'add', email, password]);
            if (quota) {
              await execInMailserver(['quota', 'set', email, quota]);
            }
            await execInMailserver(['config', 'dkim']);
            res.json({ success: true });
          } catch (err) {
            res.status(500).json({ error: err.message });
          }
        });

        app.post('/api/accounts/update', checkAuth, async (req, res) => {
          const { email, password, quota } = req.body;
          if (!email) return res.status(400).json({ error: 'Email is required' });

          try {
            if (password) {
              await execInMailserver(['email', 'update', email, password]);
            }
            if (quota !== undefined) {
              if (quota) {
                await execInMailserver(['quota', 'set', email, quota]);
              } else {
                try {
                  await execInMailserver(['quota', 'set', email, '0']);
                } catch (e) {}
              }
            }
            res.json({ success: true });
          } catch (err) {
            res.status(500).json({ error: err.message });
          }
        });

        app.post('/api/accounts/delete', checkAuth, async (req, res) => {
          const { email } = req.body;
          if (!email) return res.status(400).json({ error: 'Email is required' });

          try {
            await execInMailserver(['email', 'del', email]);
            const [user, domain] = email.split('@');
            if (user && domain) {
              await execInMailserverRaw(['rm', '-rf', '/var/mail/' + domain + '/' + user]);
            }
            res.json({ success: true });
          } catch (err) {
            res.status(500).json({ error: err.message });
          }
        });

        app.post('/api/accounts/send-instructions', checkAuth, async (req, res) => {
          const { email, targetEmail, tempPassword } = req.body;
          if (!email || !targetEmail) return res.status(400).json({ error: 'Email and target email are required' });

          const passwordRow = tempPassword 
            ? `<tr>
                 <td style="padding: 6px 0; color: #6b7280; font-weight: 500;">Contraseña Temporal:</td>
                 <td style="padding: 6px 0; color: #111827; font-weight: bold; font-family: monospace;">${tempPassword}</td>
               </tr>`
            : `<tr>
                 <td style="padding: 6px 0; color: #6b7280; font-weight: 500;">Contraseña:</td>
                 <td style="padding: 6px 0; color: #9ca3af; font-style: italic;">[Usa la contraseña asignada por tu administrador]</td>
               </tr>`;

          const mailOptions = {
            from: '"Soporte Técnico" <postmaster@arzzi.xyz>',
            to: targetEmail,
            subject: 'Configuración de tu cuenta de correo: ' + email,
            html: `
              <div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e0e0e0; border-radius: 10px; background-color: #fcfcfc;">
                <h2 style="color: #4f46e5; margin-bottom: 20px; text-align: center; font-weight: 600;">Detalles de Configuración de Correo</h2>
                <p style="color: #374151; font-size: 15px; line-height: 1.6;">Hola,</p>
                <p style="color: #374151; font-size: 15px; line-height: 1.6;">A continuación encontrarás los parámetros oficiales para configurar tu nueva cuenta de correo corporativo en tu cliente favorito (Outlook, Thunderbird, Mail de Apple o tu celular Android/iPhone):</p>
                
                <div style="background-color: #f3f4f6; padding: 15px; border-radius: 8px; margin: 20px 0;">
                  <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                    <tr>
                      <td style="padding: 6px 0; color: #6b7280; font-weight: 500; width: 40%;">Dirección de Correo:</td>
                      <td style="padding: 6px 0; color: #111827; font-weight: bold; font-family: monospace;">${email}</td>
                    </tr>
                    <tr>
                      <td style="padding: 6px 0; color: #6b7280; font-weight: 500;">Nombre de Usuario:</td>
                      <td style="padding: 6px 0; color: #111827; font-weight: bold; font-family: monospace;">${email}</td>
                    </tr>
                    ${passwordRow}
                  </table>
                </div>

                <div style="text-align: center; margin: 30px 0;">
                  <a href="https://webmail.arzzi.xyz" style="background-color: #4f46e5; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 15px; display: inline-block;">Acceder al Webmail</a>
                </div>

                <h3 style="color: #111827; font-size: 16px; margin-top: 25px; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px;">1. Configuración Recomendada (IMAP - Seguro)</h3>
                <p style="color: #6b7280; font-size: 12px; margin-top: -8px;">Mantiene los correos sincronizados en todos tus dispositivos.</p>
                <table style="width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px;">
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Servidor de Entrada:</td>
                    <td style="padding: 8px 0; color: #111827; font-family: monospace;">mail.arzzi.xyz</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Puerto de Entrada:</td>
                    <td style="padding: 8px 0; color: #111827; font-family: monospace;">993</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Método de Encriptación:</td>
                    <td style="padding: 8px 0; color: #059669; font-weight: bold;">SSL / TLS</td>
                  </tr>
                </table>

                <h3 style="color: #111827; font-size: 16px; margin-top: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px;">2. Configuración Opcional (POP3 - Descarga Local)</h3>
                <p style="color: #6b7280; font-size: 12px; margin-top: -8px;">Descarga los correos del servidor a tu equipo local.</p>
                <table style="width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px;">
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Servidor de Entrada:</td>
                    <td style="padding: 8px 0; color: #111827; font-family: monospace;">mail.arzzi.xyz</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Puerto de Entrada:</td>
                    <td style="padding: 8px 0; color: #111827; font-family: monospace;">995</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Método de Encriptación:</td>
                    <td style="padding: 8px 0; color: #059669; font-weight: bold;">SSL / TLS</td>
                  </tr>
                </table>

                <h3 style="color: #111827; font-size: 16px; margin-top: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px;">3. Servidor de Salida (SMTP - Envío)</h3>
                <table style="width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px;">
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Servidor de Salida:</td>
                    <td style="padding: 8px 0; color: #111827; font-family: monospace;">mail.arzzi.xyz</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Puerto de Salida (Recomendado):</td>
                    <td style="padding: 8px 0; color: #111827; font-family: monospace;">465 (SSL/TLS) o 587 (STARTTLS)</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;">
                    <td style="padding: 8px 0; color: #4b5563; font-weight: 500;">Autenticación Requerida:</td>
                    <td style="padding: 8px 0; color: #059669; font-weight: bold;">Sí (Mismas credenciales de entrada)</td>
                  </tr>
                </table>

                <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 30px 0;">
                <p style="color: #6b7280; font-size: 13px;">Nota de seguridad: Si deseas cambiar la contraseña de tu cuenta, solicítala directamente a tu administrador Diego.</p>
                <p style="color: #9ca3af; font-size: 11px; text-align: center;">Este es un correo automático de configuración del sistema de correo corporativo.</p>
              </div>
            `
          };

          try {
            await transporter.sendMail(mailOptions);
            res.json({ success: true });
          } catch (err) {
            res.status(500).json({ error: err.message });
          }
        });

        app.get('/', (req, res) => {
          res.sendFile(path.join(__dirname, 'views', 'index.html'));
        });

        app.listen(PORT, () => {
          console.log('DMS Manager running on port ' + PORT);
        });
        EOF
        cat << 'EOF' > /app/views/index.html
        <!DOCTYPE html>
        <html lang="es">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>DMS Manager — Panel de Control Multi-Cliente</title>
          <script src="https://cdn.tailwindcss.com"></script>
          <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
          <style>
            body {
              font-family: 'Outfit', sans-serif;
              background: radial-gradient(circle at top right, #111827, #030712);
              color: #f3f4f6;
            }
            .glass {
              background: rgba(17, 24, 39, 0.7);
              backdrop-filter: blur(12px);
              border: 1px solid rgba(255, 255, 255, 0.08);
            }
          </style>
        </head>
        <body class="min-h-screen p-6 md:p-12">
          <div class="max-w-6xl mx-auto">
            
            <!-- Vista de Login (TOTP Lock Screen) -->
            <div id="loginView" class="fixed inset-0 bg-gray-950 flex items-center justify-center hidden z-50">
              <div class="glass p-8 rounded-3xl max-w-md w-full mx-4 shadow-2xl border border-indigo-500/20 text-center">
                <div class="w-16 h-16 bg-indigo-600/10 text-indigo-400 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl">
                  🔒
                </div>
                <h2 class="text-2xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">
                  Acceso Restringido
                </h2>
                <p class="text-xs text-gray-400 mb-6">
                  Ingresa el código de 6 dígitos de tu aplicación Authenticator para desbloquear el panel.
                </p>
                <form id="loginForm" class="space-y-4">
                  <div>
                    <input type="text" id="totpCode" required maxlength="6" pattern="[0-9]*" placeholder="000000" class="w-full text-center px-4 py-4 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-2xl tracking-widest font-mono text-white">
                  </div>
                  <button type="submit" id="loginBtn" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition rounded-xl font-semibold text-sm shadow-lg shadow-indigo-900/40 text-white">
                    Verificar y Entrar
                  </button>
                </form>
                <div id="loginStatus" class="mt-4 text-center text-sm text-red-400 hidden"></div>
                
                <div class="mt-8 pt-6 border-t border-gray-900 text-left">
                  <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Configurar Authenticator:</h4>
                  <ol class="text-[11px] text-gray-400 list-decimal pl-4 space-y-1">
                    <li>Abre tu app Google Authenticator en el celular.</li>
                    <li>Agrega cuenta con **Ingresar clave de configuración**.</li>
                    <li>Nombre: <strong class="text-gray-300">DMS Manager</strong></li>
                    <li>Clave: <strong class="text-indigo-400 font-mono">ARZZIWEBMAILMANAGERSECRETAUTH</strong></li>
                  </ol>
                </div>
              </div>
            </div>

            <!-- Vista 1: Listado de Clientes -->
            <div id="clientsView" class="space-y-8 hidden">
              <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
                <div>
                  <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500">
                    Panel de Clientes (Dominios)
                  </h1>
                  <p class="text-gray-400 mt-1">Registra nuevos clientes y selecciona a quién deseas configurar o modificar.</p>
                </div>
                <button onclick="logout()" class="px-4 py-2 bg-red-950/40 hover:bg-red-900/40 border border-red-900/30 text-red-400 text-xs font-semibold rounded-lg transition">
                  Cerrar Sesión 🚪
                </button>
              </header>

              <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Columna Izquierda: Crear Cliente -->
                <div class="lg:col-span-1">
                  <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-indigo-400">
                      ➕ Registrar Nuevo Cliente
                    </h2>
                    <form id="createDomainForm" class="space-y-4">
                      <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Dominio del Cliente</label>
                        <input type="text" id="newDomainName" required placeholder="cliente.com" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                      </div>
                      <button type="submit" id="createDomainBtn" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition rounded-xl font-medium text-sm shadow-lg shadow-indigo-900/40">
                        Registrar Cliente
                      </button>
                    </form>
                    <div id="createDomainStatus" class="mt-4 text-center text-sm hidden"></div>
                  </div>
                </div>

                <!-- Columna Derecha: Tabla de Clientes -->
                <div class="lg:col-span-2">
                  <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-semibold mb-6 text-indigo-400">📂 Clientes Registrados</h2>
                    <div class="overflow-x-auto">
                      <table class="w-full text-left">
                        <thead>
                          <tr class="border-b border-gray-800 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                            <th class="pb-3">Nombre del Dominio</th>
                            <th class="pb-3">Cuentas Creadas</th>
                            <th class="pb-3 text-right">Acción</th>
                          </tr>
                        </thead>
                        <tbody id="domainsTableBody" class="divide-y divide-gray-850 text-sm">
                          <!-- Generado dinámicamente -->
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Vista 2: Administración del Cliente Seleccionado -->
            <div id="domainDetailView" class="space-y-8 hidden">
              <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
                <div>
                  <div class="flex items-center gap-2 text-xs text-gray-400 font-semibold mb-2">
                    <button onclick="showClientsView()" class="hover:text-blue-400 transition">🏠 Clientes</button>
                    <span>/</span>
                    <span id="breadcrumbDomain" class="text-indigo-400"></span>
                  </div>
                  <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500">
                    Gestión de Cuentas & DNS
                  </h1>
                </div>
                <div class="flex gap-2">
                  <button onclick="showClientsView()" class="px-5 py-2.5 bg-gray-850 hover:bg-gray-800 border border-gray-800 text-sm font-semibold rounded-xl transition flex items-center gap-2">
                    ⬅️ Volver a Clientes
                  </button>
                  <button onclick="logout()" class="px-4 py-2.5 bg-red-950/40 hover:bg-red-900/40 border border-red-900/30 text-red-400 text-xs font-semibold rounded-xl transition">
                    Salir 🚪
                  </button>
                </div>
              </header>

              <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Columna Izquierda: Crear Cuenta (Dominio Locked) -->
                <div class="lg:col-span-1 space-y-8">
                  <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-indigo-400">
                      ✉️ Crear Cuenta de Correo
                    </h2>
                    <form id="createForm" class="space-y-4">
                      <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Correo</label>
                        <div class="flex">
                          <input type="text" id="emailPrefix" required placeholder="contacto" class="flex-1 min-w-0 px-4 py-3 bg-gray-900 border border-gray-800 rounded-l-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                          <span id="domainSuffix" class="inline-flex items-center px-4 rounded-r-xl border border-l-0 border-gray-800 bg-gray-950 text-sm text-gray-400 font-mono">
                            @dominio.com
                          </span>
                        </div>
                      </div>
                      <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Contraseña</label>
                        <div class="relative">
                          <input type="password" id="password" required placeholder="••••••••" class="w-full pl-4 pr-12 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                          <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-400 transition">
                            <span id="eyeIcon">👁️</span>
                          </button>
                        </div>
                      </div>
                      <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Límite de Almacenamiento (Cuota)</label>
                        <select id="quota" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                          <option value="">Ilimitado</option>
                          <option value="250M">250 MB</option>
                          <option value="500M">500 MB</option>
                          <option value="1G" selected>1 GB</option>
                          <option value="2G">2 GB</option>
                          <option value="5G">5 GB</option>
                          <option value="10G">10 GB</option>
                        </select>
                      </div>
                      <button type="submit" id="submitBtn" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition rounded-xl font-medium text-sm shadow-lg shadow-indigo-900/40">
                        Crear Cuenta y Registrar DNS
                      </button>
                    </form>
                    <div id="statusMsg" class="mt-4 text-center text-sm hidden"></div>
                  </div>

                  <!-- Card Editar Cuenta (Oculto por defecto) -->
                  <div id="editCard" class="glass p-6 rounded-2xl shadow-xl hidden">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-indigo-400">
                      ✏️ Editar Cuenta de Correo
                    </h2>
                    <form id="editForm" class="space-y-4">
                      <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Correo</label>
                        <input type="email" id="editEmail" readonly class="w-full px-4 py-3 bg-gray-950 border border-gray-900 rounded-xl focus:outline-none text-sm text-gray-400 cursor-not-allowed">
                      </div>
                      <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Nueva Contraseña</label>
                        <div class="relative">
                          <input type="password" id="editPassword" placeholder="Dejar en blanco para mantener" class="w-full pl-4 pr-12 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                          <button type="button" onclick="toggleEditPassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-400 transition">
                            <span id="editEyeIcon">👁️</span>
                          </button>
                        </div>
                      </div>
                      <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Límite de Almacenamiento (Cuota)</label>
                        <select id="editQuota" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                          <option value="">Ilimitado</option>
                          <option value="250M">250 MB</option>
                          <option value="500M">500 MB</option>
                          <option value="1G">1 GB</option>
                          <option value="2G">2 GB</option>
                          <option value="5G">5 GB</option>
                          <option value="10G">10 GB</option>
                        </select>
                      </div>
                      <div class="flex gap-2">
                        <button type="submit" id="editSubmitBtn" class="flex-1 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition rounded-xl font-medium text-sm shadow-lg shadow-indigo-900/40">
                          Guardar
                        </button>
                        <button type="button" onclick="cancelEdit()" class="px-4 py-3 bg-gray-800 hover:bg-gray-700 transition rounded-xl font-medium text-sm">
                          Cancelar
                        </button>
                      </div>
                    </form>
                    <div id="editStatusMsg" class="mt-4 text-center text-sm hidden"></div>
                  </div>
                </div>

                <!-- Columna Derecha: Tabla de Cuentas y DNS del Cliente -->
                <div class="lg:col-span-2 space-y-8">
                  <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-semibold mb-6 text-indigo-400">👥 Cuentas de Correo Activas</h2>
                    <div class="overflow-x-auto">
                      <table class="w-full text-left">
                        <thead>
                          <tr class="border-b border-gray-800 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                            <th class="pb-3">Dirección de Correo</th>
                            <th class="pb-3">Cuota</th>
                            <th class="pb-3 text-right">Acciones</th>
                          </tr>
                        </thead>
                        <tbody id="accountsTable" class="divide-y divide-gray-850 text-sm">
                          <!-- Generado dinámicamente -->
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-semibold mb-6 text-indigo-400">⚙️ Configuración DNS por Dominio</h2>
                    <div id="dnsContainer" class="space-y-6">
                      <!-- Tablas DNS dinámicas -->
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>

          <script>
            let globalData = { accounts: [], domains: [], dnsData: [] };
            let currentDomain = '';

            async function loadData() {
              try {
                const res = await fetch('/api/data');
                if (res.status === 401) {
                  document.getElementById('loginView').classList.remove('hidden');
                  document.getElementById('clientsView').classList.add('hidden');
                  document.getElementById('domainDetailView').classList.add('hidden');
                  return;
                }

                document.getElementById('loginView').classList.add('hidden');

                if (currentDomain) {
                  document.getElementById('domainDetailView').classList.remove('hidden');
                  document.getElementById('clientsView').classList.add('hidden');
                } else {
                  document.getElementById('clientsView').classList.remove('hidden');
                  document.getElementById('domainDetailView').classList.add('hidden');
                }

                globalData = await res.json();
                
                renderDomainsTable();
                if (currentDomain) {
                  renderDomainDetails();
                }
              } catch (err) {
                console.error("Error cargando datos", err);
              }
            }

            function renderDomainsTable() {
              const tbody = document.getElementById('domainsTableBody');
              tbody.innerHTML = '';
              
              if (globalData.domains.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-gray-500">No hay clientes registrados.</td></tr>';
                return;
              }

              globalData.domains.forEach(domain => {
                const mailCount = globalData.accounts.filter(a => a.domain === domain).length;
                tbody.innerHTML += '<tr class="hover:bg-gray-900/30 transition">' +
                  '<td class="py-4 font-semibold text-gray-200">' + domain + '</td>' +
                  '<td class="py-4 text-gray-400">' + mailCount + ' cuenta(s)</td>' +
                  '<td class="py-4 text-right">' +
                    '<button onclick="manageDomain(\'' + domain + '\')" class="text-xs bg-indigo-600/30 text-indigo-400 hover:bg-indigo-600 hover:text-white px-3 py-1.5 rounded-lg transition font-medium">⚙️ Administrar Cliente</button>' +
                  '</td>' +
                '</tr>';
              });
            }

            function manageDomain(domain) {
              currentDomain = domain;
              document.getElementById('breadcrumbDomain').innerText = domain;
              document.getElementById('domainSuffix').innerText = '@' + domain;
              
              document.getElementById('clientsView').classList.add('hidden');
              document.getElementById('domainDetailView').classList.remove('hidden');
              
              renderDomainDetails();
            }

            function showClientsView() {
              currentDomain = '';
              document.getElementById('domainDetailView').classList.add('hidden');
              document.getElementById('clientsView').classList.remove('hidden');
              document.getElementById('editCard').classList.add('hidden');
            }

            function renderDomainDetails() {
              // 1. Render Accounts
              const accountsTable = document.getElementById('accountsTable');
              accountsTable.innerHTML = '';
              const filteredAccounts = globalData.accounts.filter(a => a.domain === currentDomain);
              
              if (filteredAccounts.length === 0) {
                accountsTable.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-gray-500">No hay cuentas creadas para este cliente aún.</td></tr>';
              } else {
                filteredAccounts.forEach(acc => {
                  accountsTable.innerHTML += '<tr class="hover:bg-gray-900/30 transition">' +
                    '<td class="py-3 font-medium text-gray-200">' + acc.email + '</td>' +
                    '<td class="py-3 text-gray-400">' + acc.quota + '</td>' +
                    '<td class="py-3 text-right space-x-1">' +
                      '<button onclick="startSendInstructions(\'' + acc.email + '\')" class="text-xs bg-blue-600/30 text-blue-400 hover:bg-blue-600 hover:text-white px-2 py-1 rounded-lg transition" title="Enviar Instrucciones">Instrucciones</button>' +
                      '<button onclick="startEdit(\'' + acc.email + '\', \'' + acc.quota + '\')" class="text-xs bg-indigo-600/30 text-indigo-400 hover:bg-indigo-600 hover:text-white px-2 py-1 rounded-lg transition">Editar</button>' +
                      '<button onclick="startDelete(\'' + acc.email + '\')" class="text-xs bg-red-650/30 text-red-400 hover:bg-red-600 hover:text-white px-2 py-1 rounded-lg transition">Eliminar</button>' +
                    '</td>' +
                  '</tr>';
                });
              }

              // 2. Render DNS Data
              const dnsContainer = document.getElementById('dnsContainer');
              dnsContainer.innerHTML = '';
              const domainData = globalData.dnsData.find(d => d.domain === currentDomain);

              if (domainData) {
                dnsContainer.innerHTML = '<div class="p-6 bg-gray-900/40 border border-gray-800 rounded-xl space-y-4">' +
                  '<h3 class="font-bold text-lg text-blue-400 flex justify-between items-center">' +
                    '<span>DNS de ' + domainData.domain + '</span>' +
                  '</h3>' +
                  '<div class="overflow-x-auto">' +
                    '<table class="w-full text-left text-xs">' +
                      '<thead>' +
                        '<tr class="border-b border-gray-800 text-gray-400 uppercase font-semibold">' +
                          '<th class="pb-2">Tipo</th>' +
                          '<th class="pb-2">Nombre / Host</th>' +
                          '<th class="pb-2">Valor / Destino</th>' +
                          '<th class="pb-2 text-right">Acciones</th>' +
                        '</tr>' +
                      '</thead>' +
                      '<tbody class="divide-y divide-gray-850">' +
                        '<tr class="hover:bg-gray-900/20 transition">' +
                          '<td class="py-3"><span class="bg-blue-900/30 text-blue-400 px-2 py-0.5 rounded font-mono">A</span></td>' +
                          '<td class="py-3 font-mono">mail</td>' +
                          '<td class="py-3 font-mono text-gray-300">173.212.255.14</td>' +
                          '<td class="py-3 text-right space-x-1 shrink-0">' +
                            '<button onclick="copyText(\'mail\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                            '<button onclick="copyText(\'173.212.255.14\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                          '</td>' +
                        '</tr>' +
                        '<tr class="hover:bg-gray-900/20 transition">' +
                          '<td class="py-3"><span class="bg-green-900/30 text-green-400 px-2 py-0.5 rounded font-mono">MX</span></td>' +
                          '<td class="py-3 font-mono">@</td>' +
                          '<td class="py-3 font-mono text-gray-300">mail.arzzi.xyz (Prioridad 10)</td>' +
                          '<td class="py-3 text-right space-x-1 shrink-0">' +
                            '<button onclick="copyText(\'@\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                            '<button onclick="copyText(\'mail.arzzi.xyz\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                          '</td>' +
                        '</tr>' +
                        '<tr class="hover:bg-gray-900/20 transition">' +
                          '<td class="py-3"><span class="bg-purple-900/30 text-purple-400 px-2 py-0.5 rounded font-mono">TXT</span></td>' +
                          '<td class="py-3 font-mono">@</td>' +
                          '<td class="py-3 font-mono text-green-300 break-all">' + domainData.spf + '</td>' +
                          '<td class="py-3 text-right space-x-1 shrink-0">' +
                            '<button onclick="copyText(\'@\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                            '<button onclick="copyText(\'' + domainData.spf + '\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                          '</td>' +
                        '</tr>' +
                        '<tr class="hover:bg-gray-900/20 transition">' +
                          '<td class="py-3"><span class="bg-purple-900/30 text-purple-400 px-2 py-0.5 rounded font-mono">TXT</span></td>' +
                          '<td class="py-3 font-mono">mail._domainkey</td>' +
                          '<td class="py-3 font-mono text-purple-300 break-all select-all block max-h-16 overflow-y-auto">' + domainData.dkim + '</td>' +
                          '<td class="py-3 text-right space-x-1 shrink-0">' +
                            '<button onclick="copyText(\'mail._domainkey\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                            '<button onclick="copyText(\'' + domainData.dkim + '\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                          '</td>' +
                        '</tr>' +
                        '<tr class="hover:bg-gray-900/20 transition">' +
                          '<td class="py-3"><span class="bg-purple-900/30 text-purple-400 px-2 py-0.5 rounded font-mono">TXT</span></td>' +
                          '<td class="py-3 font-mono">_dmarc</td>' +
                          '<td class="py-3 font-mono text-indigo-300 break-all">' + domainData.dmarc + '</td>' +
                          '<td class="py-3 text-right space-x-1 shrink-0">' +
                            '<button onclick="copyText(\'_dmarc\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                            '<button onclick="copyText(\'' + domainData.dmarc + '\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                          '</td>' +
                        '</tr>' +
                      '</tbody>' +
                    '</table>' +
                  '</div>' +
                '</div>';
              } else {
                dnsContainer.innerHTML = '<p class="text-gray-500 text-sm">Cargando DNS...</p>';
              }
            }

            function copyText(txt) {
              navigator.clipboard.writeText(txt);
              alert('¡Copiado al portapapeles!');
            }

            function togglePassword() {
              const passInput = document.getElementById('password');
              const eyeIcon = document.getElementById('eyeIcon');
              if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerText = '🔒';
              } else {
                passInput.type = 'password';
                eyeIcon.innerText = '👁️';
              }
            }

            function toggleEditPassword() {
              const passInput = document.getElementById('editPassword');
              const eyeIcon = document.getElementById('editEyeIcon');
              if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerText = '🔒';
              } else {
                passInput.type = 'password';
                eyeIcon.innerText = '👁️';
              }
            }

            function startEdit(email, quota) {
              document.getElementById('editCard').classList.remove('hidden');
              document.getElementById('editEmail').value = email;
              document.getElementById('editPassword').value = '';
              const quotaSelect = document.getElementById('editQuota');
              quotaSelect.value = quota === 'Ilimitado' ? '' : quota;
              document.getElementById('editCard').scrollIntoView({ behavior: 'smooth' });
            }

            function cancelEdit() {
              document.getElementById('editCard').classList.add('hidden');
            }

            let emailToDelete = '';
            function startDelete(email) {
              emailToDelete = email;
              document.getElementById('deleteEmailDisplay').innerText = email;
              document.getElementById('deleteModal').classList.remove('hidden');
              document.getElementById('deleteModalStatus').classList.add('hidden');
            }

            function closeDeleteModal() {
              document.getElementById('deleteModal').classList.add('hidden');
            }

            async function confirmDelete() {
              const btn = document.getElementById('confirmDeleteBtn');
              const status = document.getElementById('deleteModalStatus');
              btn.disabled = true;
              btn.innerText = 'Eliminando...';
              status.className = 'mt-4 text-center text-sm text-blue-400';
              status.innerText = 'Borrando cuenta y limpiando archivos de correo...';
              status.classList.remove('hidden');

              try {
                const res = await fetch('/api/accounts/delete', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email: emailToDelete })
                });
                const r = await res.json();
                if (res.ok && r.success) {
                  status.className = 'mt-4 text-center text-sm text-green-400';
                  status.innerText = '¡Cuenta eliminada correctamente!';
                  setTimeout(() => {
                    closeDeleteModal();
                  }, 1200);
                  await loadData();
                } else {
                  status.className = 'mt-4 text-center text-sm text-red-400';
                  status.innerText = 'Error: ' + (r.error || 'No se pudo eliminar la cuenta.');
                }
              } catch (err) {
                status.className = 'mt-4 text-center text-sm text-red-400';
                status.innerText = 'Error de conexión.';
              } finally {
                btn.disabled = false;
                btn.innerText = 'Eliminar permanentemente';
              }
            }

            let emailForInstructions = '';
            function startSendInstructions(email) {
              emailForInstructions = email;
              document.getElementById('instructionsEmail').value = email;
              document.getElementById('instructionsTargetEmail').value = '';
              document.getElementById('instructionsTempPassword').value = '';
              document.getElementById('instructionsModal').classList.remove('hidden');
              document.getElementById('instructionsModalStatus').classList.add('hidden');
            }

            function closeSendInstructionsModal() {
              document.getElementById('instructionsModal').classList.add('hidden');
            }

            async function confirmSendInstructions() {
              const target = document.getElementById('instructionsTargetEmail').value;
              const tempPassword = document.getElementById('instructionsTempPassword').value;
              if (!target) {
                alert('Por favor escribe un correo destinatario.');
                return;
              }
              const btn = document.getElementById('confirmSendInstructionsBtn');
              const status = document.getElementById('instructionsModalStatus');
              btn.disabled = true;
              btn.innerText = 'Enviando...';
              status.className = 'mt-4 text-center text-sm text-blue-400';
              status.innerText = 'Enviando correo con instrucciones...';
              status.classList.remove('hidden');

              try {
                const res = await fetch('/api/accounts/send-instructions', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email: emailForInstructions, targetEmail: target, tempPassword })
                });
                const r = await res.json();
                if (res.ok && r.success) {
                  status.className = 'mt-4 text-center text-sm text-green-400';
                  status.innerText = '¡Instrucciones enviadas correctamente!';
                  setTimeout(() => {
                    closeSendInstructionsModal();
                  }, 1200);
                } else {
                  status.className = 'mt-4 text-center text-sm text-red-400';
                  status.innerText = 'Error: ' + (r.error || 'No se pudieron enviar las instrucciones.');
                }
              } catch (err) {
                status.className = 'mt-4 text-center text-sm text-red-400';
                status.innerText = 'Error de conexión.';
              } finally {
                btn.disabled = false;
                btn.innerText = 'Enviar Correo';
              }
            }

            // Iniciar sesión con TOTP
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
              e.preventDefault();
              const code = document.getElementById('totpCode').value;
              const btn = document.getElementById('loginBtn');
              const status = document.getElementById('loginStatus');

              btn.disabled = true;
              btn.innerText = 'Verificando...';
              status.classList.add('hidden');

              try {
                const res = await fetch('/api/login', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ code })
                });
                const r = await res.json();
                if (res.ok && r.success) {
                  document.getElementById('totpCode').value = '';
                  await loadData();
                } else {
                  status.innerText = r.error || 'Código incorrecto';
                  status.classList.remove('hidden');
                }
              } catch (err) {
                status.innerText = 'Error de conexión';
                status.classList.remove('hidden');
              } finally {
                btn.disabled = false;
                btn.innerText = 'Verificar y Entrar';
              }
            });

            async function logout() {
              try {
                await fetch('/api/logout', { method: 'POST' });
                showClientsView();
                await loadData();
              } catch (err) {
                console.error(err);
              }
            }

            // Registrar nuevo cliente (Dominio)
            document.getElementById('createDomainForm').addEventListener('submit', async (e) => {
              e.preventDefault();
              const domain = document.getElementById('newDomainName').value;
              const btn = document.getElementById('createDomainBtn');
              const status = document.getElementById('createDomainStatus');

              btn.disabled = true;
              btn.innerText = 'Registrando...';
              status.className = 'mt-4 text-center text-sm text-blue-400';
              status.innerText = 'Registrando cliente en la base de datos...';
              status.classList.remove('hidden');

              try {
                const res = await fetch('/api/domains', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ domain })
                });
                const r = await res.json();
                if (res.ok && r.success) {
                  status.className = 'mt-4 text-center text-sm text-green-400';
                  status.innerText = '¡Cliente registrado con éxito!';
                  document.getElementById('newDomainName').value = '';
                  await loadData();
                } else {
                  status.className = 'mt-4 text-center text-sm text-red-400';
                  status.innerText = 'Error: ' + r.error;
                }
              } catch (err) {
                status.className = 'mt-4 text-center text-sm text-red-400';
                status.innerText = 'Error de conexión.';
              } finally {
                btn.disabled = false;
                btn.innerText = 'Registrar Cliente';
              }
            });

            // Crear Cuenta de Correo (Dentro del cliente)
            document.getElementById('createForm').addEventListener('submit', async (e) => {
              e.preventDefault();
              const prefix = document.getElementById('emailPrefix').value;
              const email = prefix + '@' + currentDomain;
              const password = document.getElementById('password').value;
              const quota = document.getElementById('quota').value;
              const btn = document.getElementById('submitBtn');
              const statusMsg = document.getElementById('statusMsg');

              btn.disabled = true;
              btn.innerText = 'Creando y Configurando...';
              statusMsg.className = 'mt-4 text-center text-sm text-blue-400';
              statusMsg.innerText = 'Creando correo y generando claves de seguridad DKIM...';
              statusMsg.classList.remove('hidden');

              try {
                const res = await fetch('/api/accounts', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email, password, quota })
                });
                const r = await res.json();
                if (res.ok && r.success) {
                  statusMsg.className = 'mt-4 text-center text-sm text-green-400';
                  statusMsg.innerText = '¡Cuenta de correo y DKIM generados correctamente!';
                  document.getElementById('emailPrefix').value = '';
                  document.getElementById('password').value = '';
                  await loadData();
                } else {
                  statusMsg.className = 'mt-4 text-center text-sm text-red-400';
                  statusMsg.innerText = 'Error: ' + r.error;
                }
              } catch (err) {
                statusMsg.className = 'mt-4 text-center text-sm text-red-400';
                statusMsg.innerText = 'Error de conexión con el servidor.';
              } finally {
                btn.disabled = false;
                btn.innerText = 'Crear Cuenta y Registrar DNS';
              }
            });

            document.getElementById('editForm').addEventListener('submit', async (e) => {
              e.preventDefault();
              const email = document.getElementById('editEmail').value;
              const password = document.getElementById('editPassword').value;
              const quota = document.getElementById('editQuota').value;
              const btn = document.getElementById('editSubmitBtn');
              const statusMsg = document.getElementById('editStatusMsg');

              btn.disabled = true;
              btn.innerText = 'Guardando...';
              statusMsg.className = 'mt-4 text-center text-sm text-blue-400';
              statusMsg.innerText = 'Actualizando cuenta...';
              statusMsg.classList.remove('hidden');

              try {
                const res = await fetch('/api/accounts/update', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email, password, quota })
                });
                const r = await res.json();
                if (res.ok && r.success) {
                  statusMsg.className = 'mt-4 text-center text-sm text-green-400';
                  statusMsg.innerText = '¡Cuenta actualizada correctamente!';
                  document.getElementById('editPassword').value = '';
                  setTimeout(() => {
                    document.getElementById('editCard').classList.add('hidden');
                  }, 1500);
                  await loadData();
                } else {
                  statusMsg.className = 'mt-4 text-center text-sm text-red-400';
                  statusMsg.innerText = 'Error: ' + (r.error || 'No se pudo actualizar la cuenta.');
                }
              } catch (err) {
                statusMsg.className = 'mt-4 text-center text-sm text-red-400';
                statusMsg.innerText = 'Error de conexión con el servidor.';
              } finally {
                btn.disabled = false;
                btn.innerText = 'Guardar';
              }
            });

            loadData();
          </script>

          <!-- Modal de Eliminación (Doble Confirmación) -->
          <div id="deleteModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden z-50">
            <div class="glass p-8 rounded-2xl max-w-md w-full mx-4 shadow-2xl border border-red-500/20">
              <h3 class="text-xl font-bold text-red-450 mb-4 flex items-center gap-2">⚠️ Confirmar Eliminación</h3>
              <p class="text-sm text-gray-300 mb-6">
                ¿Estás seguro de que deseas eliminar permanentemente la cuenta <strong id="deleteEmailDisplay" class="text-white"></strong>?
                <br><br>
                <span class="text-red-400 font-semibold">Esta acción es irreversible y borrará físicamente todos sus correos y archivos adjuntos del servidor.</span>
              </p>
              <div class="flex gap-3 justify-end">
                <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 transition rounded-xl font-medium text-sm">
                  Cancelar
                </button>
                <button onclick="confirmDelete()" id="confirmDeleteBtn" class="px-5 py-2 bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-500 hover:to-rose-500 transition rounded-xl font-medium text-sm shadow-lg shadow-red-900/40 text-white">
                  Eliminar permanentemente
                </button>
              </div>
              <div id="deleteModalStatus" class="mt-4 text-center text-sm hidden"></div>
            </div>
          </div>

          <!-- Modal de Envío de Instrucciones -->
          <div id="instructionsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden z-50">
            <div class="glass p-8 rounded-2xl max-w-md w-full mx-4 shadow-2xl border border-indigo-500/20">
              <h3 class="text-xl font-bold text-indigo-400 mb-4 flex items-center gap-2">📬 Enviar Instrucciones</h3>
              <p class="text-sm text-gray-300 mb-4">
                Enviaremos las configuraciones de puertos y servidores para configurar la cuenta en dispositivos móviles o aplicaciones de escritorio.
              </p>
              <div class="space-y-4">
                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Cuenta a configurar</label>
                  <input type="text" id="instructionsEmail" readonly class="w-full px-4 py-3 bg-gray-950 border border-gray-900 rounded-xl focus:outline-none text-sm text-gray-400 cursor-not-allowed">
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Correo destinatario</label>
                  <input type="email" id="instructionsTargetEmail" placeholder="correo-alternativo@cliente.com" class="w-full px-4 py-3 bg-gray-900 border border-gray-850 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200">
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Contraseña Temporal / Inicial (Opcional)</label>
                  <input type="text" id="instructionsTempPassword" placeholder="Dejar vacío si ya la conocen" class="w-full px-4 py-3 bg-gray-900 border border-gray-850 rounded-xl focus:border-indigo-500 focus:outline-none transition text-sm text-gray-200 font-mono">
                </div>
              </div>
              <div class="flex gap-3 justify-end mt-6">
                <button onclick="closeSendInstructionsModal()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 transition rounded-xl font-medium text-sm">
                  Cancelar
                </button>
                <button onclick="confirmSendInstructions()" id="confirmSendInstructionsBtn" class="px-5 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition rounded-xl font-medium text-sm shadow-lg shadow-indigo-900/40 text-white">
                  Enviar Correo
                </button>
              </div>
              <div id="instructionsModalStatus" class="mt-4 text-center text-sm hidden"></div>
            </div>
          </div>
        </body>
        </html>
