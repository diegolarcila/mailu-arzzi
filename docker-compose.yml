services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver-j7vrlerr67hcw5p67o3b5dh4
    hostname: mail.arzzi.xyz
    domainname: arzzi.xyz
    ports:
      - "0.0.0.0:25:25"
      - "0.0.0.0:465:465"
      - "0.0.0.0:587:587"
      - "0.0.0.0:143:143"
      - "0.0.0.0:993:993"
    volumes:
      - /var/mail-data/mail/:/var/mail/
      - /var/mail-data/state/:/var/mail-state/
      - /var/mail-data/logs/:/var/log/mail/
      - /var/mail-data/config/:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ENABLE_RSPAMD=1
      - ENABLE_FAIL2BAN=1
      - ENABLE_CLAMAV=0
      - ENABLE_SPAMASSASSIN=0
      - SSL_TYPE=self-signed
      - ONE_DIR=1
      - LOG_LEVEL=info
    cap_add:
      - NET_ADMIN
    restart: always
    networks:
      - default

  webmail:
    image: roundcube/roundcubemail:latest
    container_name: webmail-j7vrlerr67hcw5p67o3b5dh4
    restart: always
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587
    depends_on:
      - mailserver
    networks:
      - default

  manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: manager-j7vrlerr67hcw5p67o3b5dh4
    restart: always
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/mail-data/config/:/config
    depends_on:
      - mailserver
    networks:
      - default

networks:
  default:
    driver: bridge
