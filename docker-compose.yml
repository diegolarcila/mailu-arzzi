                                '<button onclick="copyText(\'@\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                                '<button onclick="copyText(\'' + domainData.spf + '\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                              '</td>' +
                            '</tr>' +
                            '<tr class="hover:bg-gray-900/20 transition">' +
                              '<td class="py-3"><span class="bg-purple-900/30 text-purple-400 px-2 py-0.5 rounded font-mono">TXT</span></td>' +
                              '<td class="py-3 font-mono">mail._domainkey</td>' +
                              '<td class="py-3 font-mono text-purple-300 break-all select-all block max-h-16 overflow-y-auto">' + domainData.dkim + '</td>' +
                              '<td class="py-3 text-right space-x-1 shrink-0">' +
                                '<button onclick="copyText(\'mail._domainkey\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                                '<button onclick="copyText(\'' + domainData.dkim + '\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                              '</td>' +
                            '</tr>' +
                            '<tr class="hover:bg-gray-900/20 transition">' +
                              '<td class="py-3"><span class="bg-purple-900/30 text-purple-400 px-2 py-0.5 rounded font-mono">TXT</span></td>' +
                              '<td class="py-3 font-mono">_dmarc</td>' +
                              '<td class="py-3 font-mono text-indigo-300 break-all">' + domainData.dmarc + '</td>' +
                              '<td class="py-3 text-right space-x-1 shrink-0">' +
                                '<button onclick="copyText(\'_dmarc\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Host</button>' +
                                '<button onclick="copyText(\'' + domainData.dmarc + '\')" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px] transition">Copiar Valor</button>' +
                              '</td>' +
                            '</tr>' +
                          '</tbody>' +
                        '</table>' +
                      '</div>' +
                    '</div>';
                  });
                }
              } catch (err) {
                console.error(err);
              }
            }

            function copyText(txt) {
              navigator.clipboard.writeText(txt);
              alert('¡Copiado al portapapeles!');
            }

             function togglePassword() {
              const passInput = document.getElementById('password');
              const eyeIcon = document.getElementById('eyeIcon');
              if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerText = '🔒';
              } else {
                passInput.type = 'password';
                eyeIcon.innerText = '👁️';
              }
            }

            function toggleEditPassword() {
              const passInput = document.getElementById('editPassword');
              const eyeIcon = document.getElementById('editEyeIcon');
              if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerText = '🔒';
              } else {
                passInput.type = 'password';
                eyeIcon.innerText = '👁️';
              }
            }

            function startEdit(email, quota) {
              document.getElementById('editCard').classList.remove('hidden');
              document.getElementById('editEmail').value = email;
              document.getElementById('editPassword').value = '';
              const quotaSelect = document.getElementById('editQuota');
              quotaSelect.value = quota === 'Ilimitado' ? '' : quota;
              document.getElementById('editCard').scrollIntoView({ behavior: 'smooth' });
            }

            function cancelEdit() {
              document.getElementById('editCard').classList.add('hidden');
            }document.getElementById('createForm').addEventListener('submit', async (e) => {
              e.preventDefault();
              const email = document.getElementById('email').value;
              const password = document.getElementById('password').value;
              const quota = document.getElementById('quota').value;
              const btn = document.getElementById('submitBtn');
              const statusMsg = document.getElementById('statusMsg');

              btn.disabled = true;
              btn.innerText = 'Creando y Configurando...';
              statusMsg.className = 'mt-4 text-center text-sm text-blue-400';
              statusMsg.innerText = 'Creando correo y generando claves de seguridad DKIM...';
              statusMsg.classList.remove('hidden');

              try {
                const res = await fetch('/api/accounts', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email, password, quota })
                });
                const r = await res.json();
                if (res.ok && r.success) {
                  statusMsg.className = 'mt-4 text-center text-sm text-green-400';
                  statusMsg.innerText = '¡Cuenta de correo y DKIM generados correctamente!';
                  document.getElementById('email').value = '';
                  document.getElementById('password').value = '';
                  await loadData();
                } else {
                  statusMsg.className = 'mt-4 text-center text-sm text-red-400';
                  statusMsg.innerText = 'Error: ' + r.error;
                }
              } catch (err) {
                statusMsg.className = 'mt-4 text-center text-sm text-red-400';
                statusMsg.innerText = 'Error de conexión con el servidor.';
              } finally {
                btn.disabled = false;
                btn.innerText = 'Crear Cuenta y Registrar DNS';
              }
            });

            document.getElementById('editForm').addEventListener('submit', async (e) => {
              e.preventDefault();
              const email = document.getElementById('editEmail').value;
              const password = document.getElementById('editPassword').value;
              const quota = document.getElementById('editQuota').value;
              const btn = document.getElementById('editSubmitBtn');
              const statusMsg = document.getElementById('editStatusMsg');

              btn.disabled = true;
              btn.innerText = 'Guardando...';
              statusMsg.className = 'mt-4 text-center text-sm text-blue-400';
              statusMsg.innerText = 'Actualizando cuenta...';
              statusMsg.classList.remove('hidden');

              try {
                const res = await fetch('/api/accounts/update', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email, password, quota })
                });
                const r = await res.json();
                if (res.ok && r.success) {
                  statusMsg.className = 'mt-4 text-center text-sm text-green-400';
                  statusMsg.innerText = '¡Cuenta actualizada correctamente!';
                  document.getElementById('editPassword').value = '';
                  setTimeout(() => {
                    document.getElementById('editCard').classList.add('hidden');
                  }, 1500);
                  await loadData();
                } else {
                  statusMsg.className = 'mt-4 text-center text-sm text-red-400';
                  statusMsg.innerText = 'Error: ' + (r.error || 'No se pudo actualizar la cuenta.');
                }
              } catch (err) {
                statusMsg.className = 'mt-4 text-center text-sm text-red-400';
                statusMsg.innerText = 'Error de conexión con el servidor.';
              } finally {
                btn.disabled = false;
                btn.innerText = 'Guardar Cambios';
              }
            });

            loadData();
          </script>
        </body>
        </html>
